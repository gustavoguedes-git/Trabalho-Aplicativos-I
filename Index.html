<!DOCTYPE html>
<html lang="pt-br">
<head> <!-- Cabeçalho da página com metadados e links para estilos e fontes -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinária do Brasil</title>
    <link rel="stylesheet" href="Style.css">
    <!-- Importação da fonte Inter do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <!-- Ícone da página -->
    <link rel="icon" href="Imagens/Imgtitulo.ico">
</head>
<body> <!-- Corpo da página -->

    <nav> <!-- Barra de navegação -->
        <p>Menu Inicial</p>
        <a href="SobreNos.html">Sobre Nós</a>
    </nav>
    <header class="div-titulo"> <!-- Cabeçalho da página inicial com título e imagem -->
        <h1 class="titulo"><strong>Culinária <br>do Brasil</strong></h1>
        <figure>
            <img src="Imagens/imagens-index-html/Imgtitulo.png" alt="Culinária do Brasil" title="Fonte: Pngtree" class="feijoada-img">
        </figure>
    </header>

    <section class="instrucoes flex-center-column">  <!-- Seção de instruções com título e cards -->
        <h2 class="titulo-secao">Aprenda receitas do <span class="titulo-secao-zero">zero</span></h2>
        <div class="container-cards flex-center">
            <div class="card flex-center">
                <img src="Imagens/imagens-index-html/IMGcard1.png" alt="Card 1" title="Fonte: Autoria própria (2026)" class="img-cards">
                <h3 class="card-subtitle">Veja a lista e pegue os ingredientes</h3>
            </div>
            
            <div class="card flex-center">
                <img src="Imagens/imagens-index-html/IMGcard2.png" alt="Card 2" title="Fonte: Autoria própria (2026)" class="img-cards">
                <h3 class="card-subtitle">Siga o modo de preparo</h3>
            </div>

            <div class="card flex-center">
                <img src="Imagens/imagens-index-html/IMGcard3.png" alt="Card 3" title="Fonte: Autoria própria (2026)" class="img-cards">
                <h3 class="card-subtitle">Aproveite sua refeição</h3>
            </div>
        </div>
    </section>

    <section class="regioes flex-center-column"> <!-- Seção das regiões com título e botões -->
        <h2 class="titulo-regioes">DE QUAL REGIÃO SERÁ A SUA RECEITA?</h2>
        <div class="botoes-regioes"> <!-- Container para os botões das regiões -->
            <a href="PaginaNorte.html"> <button class="region-button" id="button1">Norte</button></a> <!-- Botões para acessar as páginas das regiões -->
            <a href="PaginaNordeste.html"><button class="region-button" id="button2">Nordeste</button></a>
            <a href="PaginaCentro_Oeste.html"><button class="region-button" id="button3">Centro-Oeste</button></a>
            <a href="PaginaSudeste.html"><button class="region-button" id="button4">Sudeste</button></a>
            <a href="PaginaSul.html"><button class="region-button" id="button5">Sul</button></a>
        </div>
    </section>
        
    <footer class="footer flex-center"> <!-- Rodapé com informações do projeto -->
        <p class="footer-paragrafo">Projeto INI-2A 2026</p>
        <p class ="footer-paragrafo-imagem">As imagens utilizadas são ilustrativas</p>
    </footer>

</body>
</html>
